info:
  name: /close_suite
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{host}}/api/start_suite"
  headers:
    - name: authorization
      value: "{{secret}}"
  body:
    type: json
    data: |-
      {
        "players": ["stine", "rolf"],
        "num_games": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
